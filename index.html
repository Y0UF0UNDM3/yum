<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>THE BLACK WOODS</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; cursor: crosshair; }
        canvas { display: block; image-rendering: auto; }
        #prompt {
            position: absolute; top: 20px; width: 100%; text-align: center;
            color: rgba(255,255,255,0.15); font-family: serif;
            font-size: 12px; letter-spacing: 4px; pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="prompt">INTERACT TO START AUDIO</div>
    <canvas id="c"></canvas>

<script>
/**
 * HORROR ENGINE v4.0 - ADVANCED RENDERING
 * Fixed: Audio persistence, Zoom logic, Sign scaling, Ambient brightness
 */

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let w, h, player, trees = [], stars = [], grass = [], groundNodes = [], sign;
const keys = {};
let audioStarted = false;
let zoom = { active: false, factor: 0, timer: 0 };

// --- AUDIO SYSTEM (RE-INITIALIZED) ---
const sfxAmb = new Audio('freesound_community-spooky-ambience-49850.mp3');
const sfxWind = new Audio('freesound_community-spooky-wind-70657.mp3');
const sfxSteps = new Audio('data_pion-st1-footstep-sfx-323053.mp3');

function startAudio() {
    if(!audioStarted) {
        [sfxAmb, sfxWind].forEach(s => { s.loop = true; s.volume = 0.4; s.play().catch(()=>{}); });
        sfxSteps.loop = true; sfxSteps.volume = 0.3;
        audioStarted = true;
        document.getElementById('prompt').style.opacity = 0;
    }
}

// --- ASSET FACTORY ---

function createRealisticSign() {
    const sC = document.createElement('canvas');
    const sX = sC.getContext('2d');
    sC.width = 150; sC.height = 150;
    
    // The Post (Gnarled)
    sX.fillStyle = "#120d08";
    sX.fillRect(70, 70, 10, 80);
    
    // The Wood (Aged Plaque)
    const g = sX.createLinearGradient(10, 20, 140, 20);
    g.addColorStop(0, "#1a130c"); g.addColorStop(0.5, "#2a1f14"); g.addColorStop(1, "#150f0a");
    sX.fillStyle = g;
    sX.fillRect(10, 20, 130, 50);
    
    // Grain & Cracks
    sX.strokeStyle = "rgba(0,0,0,0.4)";
    for(let i=0; i<8; i++) {
        sX.beginPath(); sX.moveTo(10, 25+i*6); sX.lineTo(140, 28+i*5); sX.stroke();
    }
    
    // Text (Carved)
    sX.font = "bold 12px serif";
    sX.textAlign = "center";
    sX.fillStyle = "rgba(0,0,0,0.7)";
    sX.fillText("Beware of", 75, 42);
    sX.fillText("the tall one.", 75, 58);
    
    return sC;
}

function createTree(height, depth) {
    const tC = document.createElement('canvas');
    const tX = tC.getContext('2d');
    tC.width = height * 2; tC.height = height * 1.5;
    const bw = height / 14;
    function grow(x, y, l, a, w, it) {
        tX.save(); tX.translate(x, y); tX.rotate(a);
        const shade = 10 + (depth * 35); // Brightened bark
        tX.strokeStyle = `rgb(${shade},${shade-2},${shade-5})`;
        tX.lineWidth = w; tX.lineCap = 'round';
        tX.beginPath(); tX.moveTo(0,0);
        let cx = 0, cy = 0;
        for(let i=1; i<=6; i++) {
            cx += (Math.random()-0.5)*w; cy -= l/6;
            tX.lineTo(cx, cy);
        }
        tX.stroke();
        if (it > 0) {
            const split = Math.random() > 0.6 ? 3 : 2;
            for(let i=0; i<split; i++) grow(cx, cy, l*0.7, (Math.random()-0.5)*0.8, w*0.6, it-1);
        }
        tX.restore();
    }
    grow(tC.width/2, tC.height-10, height/4, 0, bw, 9);
    return tC;
}

function init() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
    player = { x: 400, y: h - 110, vx: 0, w: 22, h: 56, facing: 1, cycle: 0 };
    
    // Stars
    stars = Array.from({length: 300}, () => ({ x: Math.random()*w, y: Math.random()*h*0.7, s: Math.random()*2, o: Math.random() }));
    
    // Procedural Ground
    groundNodes = [];
    for(let i=0; i<600; i++) {
        groundNodes.push({ x: i*30 - 9000, y: h-100 + (Math.sin(i*0.3)*8) + (Math.random()*5), bump: Math.random()*4 });
    }

    // Trees
    trees = [];
    for(let i=0; i<85; i++) {
        const z = Math.random()*1.1+0.2;
        trees.push({ x: Math.random()*16000-8000, z: z, sprite: createTree(300+Math.random()*400, z) });
    }
    trees.sort((a,b) => a.z - b.z);
    
    sign = { x: 750, sprite: createRealisticSign() };
}

function update() {
    if(zoom.active) {
        zoom.timer--;
        if(zoom.timer <= 0) zoom.active = false;
        sfxSteps.pause(); return;
    }
    
    const accel = 0.8;
    if (keys['KeyA']) { 
        player.vx -= accel; player.facing = -1; player.cycle += 0.14; 
    }
    if (keys['KeyD']) { 
        player.vx += accel; player.facing = 1; player.cycle += 0.14; 
    }
    
    if (player.x < 350) { player.x = 350; player.vx = 0; } // Invisible left wall

    player.vx *= 0.88;
    player.x += player.vx;

    // Footstep audio toggle
    if(Math.abs(player.vx) > 0.4) { if(sfxSteps.paused) sfxSteps.play().catch(()=>{}); }
    else { sfxSteps.pause(); }

    if(Math.abs(player.x - sign.x) < 60 && keys['KeyE']) {
        zoom.active = true; zoom.timer = 180;
    }
}

function render() {
    // Background (A bit brighter)
    const sky = ctx.createLinearGradient(0,0,0,h);
    sky.addColorStop(0, '#020205'); sky.addColorStop(1, '#08081a');
    ctx.fillStyle = sky; ctx.fillRect(0,0,w,h);
    
    stars.forEach(s => { ctx.globalAlpha = s.o; ctx.fillStyle = "#fff"; ctx.fillRect(s.x, s.y, s.s, s.s); });

    // Smooth Zoom Transition
    zoom.factor = zoom.active ? Math.min(1, zoom.factor + 0.05) : Math.max(0, zoom.factor - 0.05);

    ctx.save();
    if(zoom.factor > 0) {
        const scale = 1 + zoom.factor * 1.5;
        // Shift camera toward the sign's screen position
        const targetX = (sign.x - player.x) + w/2;
        ctx.translate(w/2 - targetX * scale, h/2 - (h-200) * scale);
        ctx.scale(scale, scale);
    }

    // Nature
    trees.forEach(t => {
        const xp = (t.x - player.x) * t.z + w/2 - t.sprite.width/2;
        if(xp > -500 && xp < w+500) {
            ctx.globalAlpha = t.z; ctx.drawImage(t.sprite, xp, h - 100 - t.sprite.height + 15);
        }
    });

    // Ground
    ctx.globalAlpha = 1;
    ctx.beginPath(); ctx.moveTo(-200, h);
    for (let p of groundNodes) { const sx = (p.x - player.x) + w/2; ctx.lineTo(sx, p.y); }
    ctx.lineTo(w+200, h); ctx.fillStyle = "#010101"; ctx.fill();

    // Sign (Placed on ground)
    ctx.drawImage(sign.sprite, (sign.x - player.x) + w/2 - 75, h - 220);

    // Player
    ctx.save();
    ctx.translate(w/2, player.y);
    ctx.fillStyle = "#000";
    const bob = Math.abs(Math.cos(player.cycle))*5;
    ctx.fillRect(-6, 30-bob, 5, 18); ctx.fillRect(3, 30-bob, 5, 18); // Simple legs
    ctx.beginPath(); ctx.ellipse(0, 15-bob, 11, 20, 0, 0, Math.PI*2); ctx.fill(); // Torso
    ctx.beginPath(); ctx.arc(player.facing*4, -5-bob, 8, 0, Math.PI*2); ctx.fill(); // Head
    
    // Lantern Arm
    const lx = player.facing*30; const ly = 15;
    ctx.strokeStyle="#000"; ctx.lineWidth=4; ctx.beginPath(); ctx.moveTo(0, 5-bob); ctx.lineTo(lx, ly); ctx.stroke();
    ctx.fillStyle="#111"; ctx.fillRect(lx-5, ly, 10, 16);
    ctx.fillStyle="#ffbb00"; ctx.shadowBlur=30; ctx.shadowColor="#fb0"; ctx.fillRect(lx-3, ly+3, 6, 10);
    ctx.restore();

    // Lighting (Brighter ambient glow)
    const lp = { x: w/2 + (player.facing*30), y: player.y + 20 };
    const flicker = Math.random()*15;
    const lG = ctx.createRadialGradient(lp.x, lp.y, 0, lp.x, lp.y, 480 + flicker);
    lG.addColorStop(0, 'rgba(255, 180, 50, 0.35)'); 
    lG.addColorStop(0.6, 'rgba(40, 30, 10, 0.5)'); // Brighter mid-tones
    lG.addColorStop(1, 'rgba(0, 0, 0, 0.98)');
    
    ctx.globalCompositeOperation = 'multiply'; ctx.fillStyle = lG; ctx.fillRect(-w*2, -h*2, w*5, h*5);
    ctx.globalCompositeOperation = 'source-over';
    ctx.restore();
}

function run() { update(); render(); requestAnimationFrame(run); }
window.addEventListener('keydown', e => { keys[e.code] = true; startAudio(); });
window.addEventListener('keyup', e => keys[e.code] = false);
window.onresize = init; init(); run();
</script>
</body>
</html>
