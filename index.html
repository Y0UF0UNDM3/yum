<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Into the Deep Woods</title>
    <style>
        body { margin: 0; overflow: hidden; background: #020205; }
        canvas { display: block; }
        #vignette {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            box-shadow: inset 0 0 150px rgba(0,0,0,0.9); pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="vignette"></div>
    <canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let width, height, player, stars = [], trees = [], grass = [];
const config = {
    treeCount: 45,
    starCount: 150,
    gravity: 0.4,
    friction: 0.85
};

// --- INITIALIZATION ---
function init() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
    
    player = {
        x: 200, y: height - 100, w: 22, h: 48,
        vx: 0, vy: 0, grounded: false,
        lanternPos: { x: 0, y: 0 },
        facing: 1 // 1 for right, -1 for left
    };

    // Generate Night Sky
    stars = Array.from({length: config.starCount}, () => ({
        x: Math.random() * width,
        y: Math.random() * (height * 0.7),
        size: Math.random() * 1.5,
        twinkle: Math.random() * 5
    }));

    // Generate Realistic Trees (Back to Front)
    trees = [];
    for (let i = 0; i < config.treeCount; i++) {
        trees.push({
            x: Math.random() * width * 5 - width * 2,
            z: Math.random() * 2 + 0.5, // Parallax depth
            height: 180 + Math.random() * 150,
            seed: Math.random() * 1000
        });
    }
    trees.sort((a, b) => a.z - b.z); // Sort for depth sorting

    // Generate Ground Grass Blades
    grass = Array.from({length: 400}, () => ({
        x: Math.random() * width * 5 - width * 2,
        h: 5 + Math.random() * 10,
        sway: Math.random() * Math.PI,
        z: Math.random() * 1.5 + 0.5
    }));
}

// --- RENDERING HELPERS ---

function drawStarrySky() {
    // Gradient Sky
    const sky = ctx.createLinearGradient(0, 0, 0, height);
    sky.addColorStop(0, '#010103');
    sky.addColorStop(0.5, '#050510');
    sky.addColorStop(1, '#0a0a1a');
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, width, height);

    // Moon
    ctx.shadowBlur = 40;
    ctx.shadowColor = 'rgba(200, 220, 255, 0.3)';
    ctx.fillStyle = '#eef';
    ctx.beginPath();
    ctx.arc(width * 0.8, 100, 30, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;

    // Twinkling Stars
    ctx.fillStyle = '#fff';
    stars.forEach(s => {
        const opacity = Math.abs(Math.sin(Date.now() * 0.001 + s.twinkle));
        ctx.globalAlpha = opacity;
        ctx.fillRect(s.x, s.y, s.size, s.size);
    });
    ctx.globalAlpha = 1.0;
}

function drawBranch(x, y, len, angle, branchWidth, depth, lightX, lightY) {
    ctx.save();
    
    // Normal Mapping logic: change branch color based on light position
    const distToLight = Math.hypot(x - lightX, y - lightY);
    const lightFactor = Math.max(0, 1 - distToLight / 350);
    const shadowFactor = (angle < 0) ? 0.3 : 0.7; // Fake 3D lighting

    ctx.translate(x, y);
    ctx.rotate(angle);
    
    // Branch Gradient for 3D rounded look
    const grad = ctx.createLinearGradient(-branchWidth/2, 0, branchWidth/2, 0);
    grad.addColorStop(0, '#050505'); // Shadow side
    grad.addColorStop(0.5, `rgb(${30 + lightFactor * 60}, ${25 + lightFactor * 40}, 20)`);
    grad.addColorStop(1, '#111'); // Back side
    
    ctx.strokeStyle = grad;
    ctx.lineWidth = branchWidth;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(0, -len);
    ctx.stroke();

    if (depth > 0) {
        const sway = Math.sin(Date.now() * 0.0005 + x) * 0.05;
        drawBranch(0, -len, len * 0.75, angle + 0.4 + sway, branchWidth * 0.7, depth - 1, lightX - x, lightY - y);
        drawBranch(0, -len, len * 0.75, angle - 0.4 - sway, branchWidth * 0.7, depth - 1, lightX - x, lightY - y);
    } else {
        // Pine-like Leaves
        ctx.fillStyle = `rgba(5, ${20 + lightFactor * 50}, 10, 0.6)`;
        ctx.beginPath();
        ctx.arc(0, -len, 6, 0, Math.PI * 2);
        ctx.fill();
    }
    
    ctx.restore();
}

// --- MAIN LOOP ---
const keys = {};
window.onkeydown = e => keys[e.code] = true;
window.onkeyup = e => keys[e.code] = false;

function update() {
    if (keys['KeyA']) { player.vx -= 0.6; player.facing = -1; }
    if (keys['KeyD']) { player.vx += 0.6; player.facing = 1; }
    if (keys['Space'] && player.grounded) { player.vy = -11; player.grounded = false; }

    player.vx *= config.friction;
    player.vy += config.gravity;
    player.x += player.vx;
    player.y += player.vy;

    if (player.y > height - 70 - player.h) {
        player.y = height - 70 - player.h;
        player.vy = 0;
        player.grounded = true;
    }

    // Lantern position (follows player with slight sway)
    const bob = Math.sin(Date.now() * 0.005) * 3;
    player.lanternPos.x = width/2 + (player.facing * 18);
    player.lanternPos.y = player.y + 25 + bob;
}

function draw() {
    ctx.clearRect(0, 0, width, height);
    drawStarrySky();

    const worldOffset = player.x;

    // Draw Background Layer
    trees.forEach(t => {
        const screenX = (t.x - worldOffset) * t.z + (width / 2);
        if (screenX > -200 && screenX < width + 200) {
            ctx.globalAlpha = Math.min(1, t.z / 1.5);
            drawBranch(screenX, height - 60, t.height, 0, t.height/12, 5, player.lanternPos.x, player.lanternPos.y);
        }
    });

    // Draw Player
    ctx.globalAlpha = 1;
    ctx.fillStyle = '#0a0a0a'; // Dark silhouette
    ctx.fillRect(width/2 - player.w/2, player.y, player.w, player.h);
    
    // Draw Lantern (The Physical Object)
    ctx.fillStyle = '#443';
    ctx.fillRect(player.lanternPos.x - 4, player.lanternPos.y - 4, 8, 10);
    ctx.fillStyle = '#fb0';
    ctx.fillRect(player.lanternPos.x - 2, player.lanternPos.y, 4, 6);

    // Draw Ground
    ctx.fillStyle = '#050705';
    ctx.fillRect(0, height - 70, width, 70);

    // LIGHTING OVERLAY (The Atmosphere)
    const lanternGrad = ctx.createRadialGradient(
        player.lanternPos.x, player.lanternPos.y, 5,
        player.lanternPos.x, player.lanternPos.y, 350
    );
    lanternGrad.addColorStop(0, 'rgba(255, 180, 50, 0.25)'); // Lantern core
    lanternGrad.addColorStop(0.4, 'rgba(100, 60, 20, 0.15)'); // Warm glow
    lanternGrad.addColorStop(1, 'rgba(0, 0, 0, 0.98)'); // Pitch black
    
    ctx.fillStyle = lanternGrad;
    ctx.globalCompositeOperation = 'multiply';
    ctx.fillRect(0, 0, width, height);
    ctx.globalCompositeOperation = 'source-over';
}

function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

init();
loop();
window.onresize = init;
</script>
</body>
</html>
