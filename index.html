<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>THE BLACK WOODS</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; cursor: crosshair; }
        canvas { display: block; image-rendering: pixelated; }
        #prompt {
            position: absolute; top: 50%; width: 100%; text-align: center;
            color: rgba(255,255,255,0.1); font-family: 'Courier New', monospace;
            font-size: 14px; letter-spacing: 8px; pointer-events: none;
            transition: opacity 2s;
        }
    </style>
</head>
<body>
    <div id="prompt">INTERACT TO START</div>
    <canvas id="c"></canvas>

<script>
/** 
 * COLOSSUS ENGINE v2.0 - Hyper-Realistic Horror 
 * No assets folder. No external libraries. Pure Logic.
 */

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let w, h, player, trees = [], stars = [], fog = [], grass = [];
const keys = {};
let audioStarted = false;

// --- AUDIO HANDLING ---
const sfxAmb = new Audio('freesound_community-spooky-ambience-49850.mp3');
const sfxWind = new Audio('freesound_community-spooky-wind-70657.mp3');
[sfxAmb, sfxWind].forEach(a => { a.loop = true; a.volume = 0.5; });

function startAudio() {
    if(!audioStarted) {
        sfxAmb.play(); sfxWind.play();
        audioStarted = true;
        document.getElementById('prompt').style.opacity = 0;
    }
}

// --- ASSET FACTORY (Hyper-Realistic Procedural Trees) ---

function createHyperTree(height, depth) {
    const tC = document.createElement('canvas');
    const tX = tC.getContext('2d');
    tC.width = height * 2;
    tC.height = height * 1.5;

    const baseWidth = height / 12;
    
    function grow(x, y, l, a, bw, iter) {
        tX.save();
        tX.translate(x, y);
        tX.rotate(a);

        // Advanced Bark Shading
        const shade = 5 + (depth * 25);
        const g = tX.createLinearGradient(-bw/2, 0, bw/2, 0);
        g.addColorStop(0, `rgb(${shade-8},${shade-10},${shade-12})`);
        g.addColorStop(0.5, `rgb(${shade+15},${shade+12},${shade+10})`);
        g.addColorStop(1, `rgb(${shade-10},${shade-12},${shade-15})`);

        tX.strokeStyle = g;
        tX.lineWidth = bw;
        tX.lineCap = 'round';

        // Organic Gnarling (Segmented Growth)
        tX.beginPath();
        tX.moveTo(0, 0);
        let curX = 0, curY = 0;
        const segs = 5;
        for(let i=1; i<=segs; i++) {
            curX += (Math.random() - 0.5) * (bw * 0.5);
            curY -= l / segs;
            tX.lineTo(curX, curY);
        }
        tX.stroke();

        if (iter > 0) {
            const split = Math.random() > 0.7 ? 3 : 2;
            for(let i=0; i<split; i++) {
                const nextL = l * (0.65 + Math.random() * 0.2);
                const nextA = (Math.random() - 0.5) * 0.8;
                grow(curX, curY, nextL, nextA, bw * 0.68, iter - 1);
            }
        } else {
            // High-detail leaf/needle clusters
            tX.fillStyle = `rgba(5, ${15 + depth*15}, 5, 0.15)`;
            for(let j=0; j<12; j++) {
                tX.beginPath();
                tX.arc(curX + (Math.random()-0.5)*25, curY + (Math.random()-0.5)*25, 8+Math.random()*15, 0, Math.PI*2);
                tX.fill();
            }
        }
        tX.restore();
    }

    grow(tC.width/2, tC.height-20, height/4, 0, baseWidth, 9);
    return tC;
}

// --- ENGINE INITIALIZATION ---

function init() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;

    player = {
        x: 0, y: h - 130, vx: 0, vy: 0,
        w: 22, h: 56, facing: 1, cycle: 0,
        legR: 0, legL: 0, armR: 0
    };

    stars = Array.from({length: 400}, () => ({
        x: Math.random()*w, y: Math.random()*h*0.7, s: Math.random()*1.5, o: Math.random()
    }));

    trees = [];
    for(let i=0; i<85; i++) {
        const z = Math.random() * 1.1 + 0.1;
        const th = 300 + Math.random() * 450;
        trees.push({
            x: Math.random() * 8000 - 4000,
            z: z,
            sprite: createHyperTree(th, z)
        });
    }
    trees.sort((a,b) => a.z - b.z);

    grass = Array.from({length: 300}, () => ({
        x: Math.random() * 8000 - 4000,
        h: 15 + Math.random() * 20,
        z: Math.random() * 1.2 + 0.1,
        o: Math.random() * Math.PI
    }));
}

// --- RENDER LOGIC ---

function drawPlayer(x, y, p) {
    ctx.save();
    ctx.translate(x, y);
    ctx.fillStyle = "#010101";

    const bob = Math.abs(Math.cos(p.cycle)) * 4;
    const sway = Math.sin(p.cycle);

    // Dynamic IK-lite Rigging
    ctx.fillRect(-6, 40 - bob, 6, 16 + sway*12); // Leg L
    ctx.fillRect(4, 40 - bob, 6, 16 - sway*12);  // Leg R
    
    ctx.beginPath();
    ctx.ellipse(0, 25 - bob, 12, 22, 0, 0, Math.PI*2); // Body
    ctx.fill();
    
    ctx.beginPath();
    ctx.arc(p.facing * 4, 4 - bob, 9, 0, Math.PI*2); // Head
    ctx.fill();

    // Lantern Arm (Inverse Sway)
    const lx = p.facing * 30 + (Math.sin(p.cycle)*5);
    const ly = 24 + (Math.cos(p.cycle)*6);
    ctx.strokeStyle = "#010101";
    ctx.lineWidth = 5;
    ctx.beginPath();
    ctx.moveTo(p.facing * 8, 14 - bob);
    ctx.lineTo(lx, ly);
    ctx.stroke();

    // Lantern Physical Model
    ctx.fillStyle = "#151515";
    ctx.fillRect(lx - 6, ly, 12, 20);
    ctx.fillStyle = "#ffaa00";
    ctx.shadowBlur = 30;
    ctx.shadowColor = "#fa0";
    ctx.fillRect(lx - 4, ly + 4, 8, 12);
    ctx.shadowBlur = 0;

    ctx.restore();
    return { x: x + lx, y: y + ly + 10 };
}

function update() {
    const accel = 0.8;
    if (keys['KeyA']) { player.vx -= accel; player.facing = -1; player.cycle += 0.14; }
    if (keys['KeyD']) { player.vx += accel; player.facing = 1; player.cycle += 0.14; }
    
    player.vx *= 0.88;
    player.x += player.vx;
}

function render() {
    // Background 
    const sky = ctx.createLinearGradient(0,0,0,h);
    sky.addColorStop(0, '#000'); sky.addColorStop(1, '#04040a');
    ctx.fillStyle = sky; ctx.fillRect(0,0,w,h);

    ctx.fillStyle = "#fff";
    stars.forEach(s => { ctx.globalAlpha = s.o * Math.random(); ctx.fillRect(s.x, s.y, s.s, s.s); });

    // Trees (Parallax System)
    trees.forEach(t => {
        const xPos = (t.x - player.x) * t.z + w/2 - t.sprite.width/2;
        if(xPos > -t.sprite.width && xPos < w + t.sprite.width) {
            ctx.globalAlpha = t.z;
            ctx.drawImage(t.sprite, xPos, h - 120 - t.sprite.height + 25);
        }
    });

    // Grass
    ctx.fillStyle = "#010201";
    grass.forEach(g => {
        const xPos = (g.x - player.x) * g.z + w/2;
        if(xPos > -20 && xPos < w + 20) {
            ctx.globalAlpha = g.z;
            const sway = Math.sin(Date.now()*0.002 + g.o) * 5;
            ctx.beginPath();
            ctx.moveTo(xPos, h - 120);
            ctx.quadraticCurveTo(xPos + sway, h - 120 - g.h/2, xPos, h - 120 - g.h);
            ctx.stroke();
        }
    });

    // Floor & Character
    ctx.globalAlpha = 1;
    ctx.fillStyle = "#010101";
    ctx.fillRect(0, h-120, w, 120);
    const lp = drawPlayer(w/2, player.y, player);

    // Advanced Multiply-Blend Lighting
    const flicker = Math.random() * 20;
    const lG = ctx.createRadialGradient(lp.x, lp.y, 0, lp.x, lp.y, 450 + flicker);
    lG.addColorStop(0, 'rgba(255, 170, 40, 0.3)');
    lG.addColorStop(0.5, 'rgba(30, 20, 5, 0.6)');
    lG.addColorStop(1, 'rgba(0, 0, 0, 0.995)');
    
    ctx.globalCompositeOperation = 'multiply';
    ctx.fillStyle = lG; ctx.fillRect(0,0,w,h);
    
    // Film Grain & Vignette
    ctx.globalAlpha = 0.05;
    for(let i=0; i<10; i++) ctx.fillRect(Math.random()*w, Math.random()*h, 2, 2);
    ctx.globalAlpha = 1;

    ctx.globalCompositeOperation = 'source-over';
}

function run() {
    update();
    render();
    requestAnimationFrame(run);
}

window.addEventListener('keydown', e => { keys[e.code] = true; startAudio(); });
window.addEventListener('keyup', e => keys[e.code] = false);
window.addEventListener('mousedown', startAudio);
window.onresize = init;

init();
run();
</script>
</body>
</html>
