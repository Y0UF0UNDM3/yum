<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nature Explorer 2.5D</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a1a; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #ui {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: flex; flex-direction: column; align-items: center; pointer-events: none;
        }
        .controls {
            background: rgba(0,0,0,0.6); color: white; padding: 12px 24px;
            border-radius: 50px; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2);
            font-size: 14px; letter-spacing: 1px; text-transform: uppercase;
        }
        #stamina-bar {
            width: 200px; height: 6px; background: rgba(255,255,255,0.2);
            margin-top: 10px; border-radius: 3px; overflow: hidden;
        }
        #stamina-fill { width: 100%; height: 100%; background: #ffcc00; transition: width 0.1s; }
    </style>
</head>
<body>
    <div id="ui">
        <div class="controls">WASD to Move &nbsp;|&nbsp; SHIFT to Sprint &nbsp;|&nbsp; SPACE to Jump</div>
        <div id="stamina-bar"><div id="stamina-fill"></div></div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- CORE INITIALIZATION ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xa3d1ff); // Soft Sky Blue
        scene.fog = new THREE.FogExp2(0xa3d1ff, 0.015);

        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        // --- LIGHTING (The "Secret" to Realism) ---
        const ambient = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambient);

        const sun = new THREE.DirectionalLight(0xffffff, 1.2);
        sun.position.set(50, 100, 50);
        sun.castShadow = true;
        sun.shadow.camera.left = -50;
        sun.shadow.camera.right = 50;
        sun.shadow.camera.top = 50;
        sun.shadow.camera.bottom = -50;
        sun.shadow.mapSize.width = 2048;
        sun.shadow.mapSize.height = 2048;
        scene.add(sun);

        // --- THE WORLD ---
        // Grass Ground
        const groundGeo = new THREE.CircleGeometry(100, 64);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x4e7a3d, roughness: 0.8 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // Grid helper for depth
        const grid = new THREE.GridHelper(200, 40, 0x4e7a3d, 0x456b36);
        grid.position.y = 0.01;
        scene.add(grid);

        // Realistic Low-Poly Trees
        function createTree(x, z) {
            const group = new THREE.Group();
            
            const trunk = new THREE.Mesh(
                new THREE.CylinderGeometry(0.2, 0.4, 2.5, 6),
                new THREE.MeshStandardMaterial({ color: 0x4d3319 })
            );
            trunk.position.y = 1.25;
            trunk.castShadow = true;
            group.add(trunk);

            const leafColors = [0x2d5a27, 0x3d7a36, 0x1e3d1a];
            const color = leafColors[Math.floor(Math.random() * leafColors.length)];

            for (let i = 0; i < 3; i++) {
                const leaves = new THREE.Mesh(
                    new THREE.ConeGeometry(1.8 - (i * 0.5), 3, 6),
                    new THREE.MeshStandardMaterial({ color: color, flatShading: true })
                );
                leaves.position.y = 2.5 + (i * 1.5);
                leaves.castShadow = true;
                group.add(leaves);
            }

            group.position.set(x, 0, z);
            group.scale.setScalar(0.8 + Math.random() * 0.5);
            scene.add(group);
        }

        for (let i = 0; i < 120; i++) {
            const r = 5 + Math.random() * 80;
            const theta = Math.random() * Math.PI * 2;
            createTree(Math.cos(theta) * r, Math.sin(theta) * r);
        }

        // --- THE PLAYER ---
        const playerGroup = new THREE.Group();
        const body = new THREE.Mesh(
            new THREE.CapsuleGeometry(0.4, 1, 4, 8),
            new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.5 })
        );
        body.position.y = 0.9;
        body.castShadow = true;
        playerGroup.add(body);

        // Character Face (to see direction)
        const eye = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.1, 0.2), new THREE.MeshStandardMaterial({color: 0x000000}));
        eye.position.set(0, 1.4, 0.35);
        playerGroup.add(eye);

        scene.add(playerGroup);

        // --- PHYSICS & LOGIC ---
        let keys = {};
        let velocity = new THREE.Vector3();
        let moveDirection = new THREE.Vector3();
        let stamina = 100;
        let isGrounded = true;

        window.addEventListener('keydown', (e) => keys[e.code] = true);
        window.addEventListener('keyup', (e) => keys[e.code] = false);

        const staminaFill = document.getElementById('stamina-fill');

        function update(delta) {
            // Movement Logic
            const isSprinting = keys['ShiftLeft'] && stamina > 0 && (keys['KeyW'] || keys['KeyS'] || keys['KeyA'] || keys['KeyD']);
            const speed = isSprinting ? 12 : 5;
            
            if (isSprinting) {
                stamina -= 30 * delta;
            } else if (stamina < 100) {
                stamina += 15 * delta;
            }
            staminaFill.style.width = `${Math.max(0, stamina)}%`;

            moveDirection.set(0, 0, 0);
            if (keys['KeyW']) moveDirection.z -= 1;
            if (keys['KeyS']) moveDirection.z += 1;
            if (keys['KeyA']) moveDirection.x -= 1;
            if (keys['KeyD']) moveDirection.x += 1;

            if (moveDirection.length() > 0) {
                moveDirection.normalize();
                // Smooth Rotation
                const targetAngle = Math.atan2(moveDirection.x, moveDirection.z);
                playerGroup.rotation.y = THREE.MathUtils.lerp(playerGroup.rotation.y, targetAngle, 0.15);
                
                velocity.x = moveDirection.x * speed;
                velocity.z = moveDirection.z * speed;
            } else {
                velocity.x = THREE.MathUtils.lerp(velocity.x, 0, 0.15);
                velocity.z = THREE.MathUtils.lerp(velocity.z, 0, 0.15);
            }

            // Gravity & Jump
            if (keys['Space'] && isGrounded) {
                velocity.y = 10;
                isGrounded = false;
            }

            if (!isGrounded) {
                velocity.y -= 25 * delta; // Gravity force
            }

            playerGroup.position.x += velocity.x * delta;
            playerGroup.position.z += velocity.z * delta;
            playerGroup.position.y += velocity.y * delta;

            if (playerGroup.position.y <= 0) {
                playerGroup.position.y = 0;
                velocity.y = 0;
                isGrounded = true;
            }

            // Camera Follow (Smooth 2.5D)
            const camOffset = new THREE.Vector3(0, 18, 12);
            const targetCamPos = playerGroup.position.clone().add(camOffset);
            camera.position.lerp(targetCamPos, 0.1);
            camera.lookAt(playerGroup.position.x, 0, playerGroup.position.z);
        }

        // --- MAIN LOOP ---
        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            update(clock.getDelta());
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
